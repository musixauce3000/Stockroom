    <div className="relative">
      <button ref={btnRef} onClick={press} title={title} className="p-1.5 rounded-lg" style={{ color: armed ? C.red : C.ink3 }}><Icon size={15} /></button>

          {onAddToList && <span onClick={(e) => { e.stopPropagation(); onAddToList(); }} className="ml-auto shrink-0 rounded-lg px-2.5 py-1.5 flex items-center gap-1" style={{ background: C.greenSoft, color: C.green, fontSize: 12, fontWeight: 700, cursor: "pointer" }}><Plus size={14} /> List</span>}
        </div>
        <AttrLine attrs={it.attrs} pinned={pinnedAttrs} name={it.name} nameStaple={it.nameEssential} />
        {tagTypes.map((type) => {
          const ids = it.tagIds.filter((id) => { const f = tagById(id); return f && f.type.id === type.id; });
          if (!ids.length) return null;
          const ordered = [...ids.filter((id) => it.essentialTagIds.includes(id)), ...ids.filter((id) => !it.essentialTagIds.includes(id))];
          return (
            <div key={type.id} className="flex items-center flex-wrap gap-1.5 mt-1.5">
              <span className="flex items-center gap-1 shrink-0" style={{ fontSize: 10, fontWeight: 700, color: C.ink3, textTransform: "uppercase", letterSpacing: "0.04em" }}>
                <span className="rounded-full" style={{ width: 7, height: 7, background: type.color }} />{type.name}
              </span>
              {ordered.map((id) => { const f = tagById(id); const ess = it.essentialTagIds.includes(id); return (
                <span key={id} className="rounded-lg px-2 py-1 flex items-center gap-1" style={{ background: type.color, color: "#fff", fontSize: 13, fontWeight: 600, boxShadow: ess ? `0 0 0 2px ${C.gold}` : "none" }}>
                  {ess && <Star size={12} color={C.gold} fill={C.gold} />}{f.tag.name}
                </span>
              ); })}
            </div>
          );
        })}
      </div>
    </button>
  );
}
function TagCtxMenu({ ctx, onRename, onDelete, onClose }) {

}

function Toolbar({ children }) { return <div className="flex flex-wrap items-center gap-x-2 gap-y-2 mb-3">{children}</div>; }

function Empty({ icon, title, body }) {

function Sheet({ children, onClose, maxWidth = 540 }) {
  useEscape(true, onClose);
  return (
    <div className="fixed inset-0 z-40 flex items-center justify-center p-4" onClick={onClose}>
      <div className="relative w-full rounded-2xl overflow-y-auto" style={{ maxWidth, maxHeight: "calc(100vh - 2rem)", background: C.card, border: `1px solid ${C.line}`, boxShadow: "0 16px 48px rgba(33,30,24,0.30)" }} onClick={(e) => e.stopPropagation()}>
        <button onClick={onClose} title="Close (Esc)" className="absolute z-10 rounded-full flex items-center justify-center" style={{ top: 12, right: 12, width: 30, height: 30, background: C.paper, border: `1px solid ${C.line}`, color: C.ink2 }}><X size={16} /></button>
        {children}

    </div>

}
/* ============================ dev ruler overlay ============================ */
const AX = "#D6336C"; // deliberately off-palette so it reads over the UI
// The ruler measures the region in display units set by `uPerPx` (logical units per screen pixel — the ruler's scale). Units fit to an edge = edgePx × uPerPx / per. ZOOM changes uPerPx, so it changes how many units span the region without touching the region. RESIZE keeps the dominant edge's fit constant (below), so the marks stretch — same span, same count. At uPerPx = 1 the ruler matches the region 1:1 (plain labels read real pixels). The far tick always lands on the region's far edge.
const PX_IN = 96, PX_MM = 96 / 25.4;                       // CSS reference; nominal, since a browser px isn't a real mm
const UNITS = { plain: { per: 1, tag: "px" }, metric: { per: PX_MM, tag: "mm" }, imperial: { per: PX_IN, tag: "in" } }; // per = logical units per 1 display unit
const UNIT_ORDER = ["plain", "metric", "imperial"];
const UPP_MIN = 0.02, UPP_MAX = 500, ZOOM = 1.5;          // scale bounds; one button press multiplies/divides the fit by ZOOM
const niceStep = (span) => { if (!(span > 0)) return 1; const raw = span / 6, mag = Math.pow(10, Math.floor(Math.log10(raw))), n = raw / mag; return (n < 1.5 ? 1 : n < 3 ? 2 : n < 7 ? 5 : 10) * mag; };
const decimalsFor = (step) => (step >= 1 ? 0 : step >= 0.1 ? 1 : 2);
const fmt = (v, d) => String(+v.toFixed(d));
// Ticks across a display-unit span: minor every step/5, major every step, indexed so there's no float drift; capped against a runaway count.
function ticksSpan(span, step) {
  const minor = step / 5, out = [], cap = 2000, n = Math.min(cap, Math.floor(span / minor + 1e-6));
  for (let i = 0; i <= n; i++) out.push({ v: i * minor, major: i % 5 === 0 });
  return out;
}
function RulerOverlay({ onClose }) {
  const initRect = () => {
    const iw = window.innerWidth, ih = window.innerHeight;
    const w = Math.min(320, iw - 96), h = Math.min(200, ih - 200);
    return { x: Math.round((iw - w) / 2), y: Math.round((ih - h) / 2), w, h };
  };
  const [rect, setRect] = useState(initRect);
  const [uPerPx, setUPerPx] = useState(1);                 // ruler scale: logical units per screen pixel (1 = ruler matches region pixels)
  const [unit, setUnit] = useState("plain");
  const zoomBy = (f) => setUPerPx((u) => Math.min(UPP_MAX, Math.max(UPP_MIN, u * f))); // >1 ⇒ more units fit (scale out); <1 ⇒ fewer (scale in)
  const cycleUnit = () => setUnit((u) => UNIT_ORDER[(UNIT_ORDER.indexOf(u) + 1) % UNIT_ORDER.length]);
  const resetScale = () => setUPerPx(1); // ruler scale back to 1:1 with the region; leaves position and size untouched
  const T = 22; // ruler band thickness
  const hBandRef = useRef(null), vBandRef = useRef(null);
  useEscape(true, onClose);
  useEffect(() => {
    const k = (e) => {
      if (e.key === "+" || e.key === "=") zoomBy(1 / ZOOM); // scale in
      else if (e.key === "-" || e.key === "_") zoomBy(ZOOM);     // scale out
    };
    window.addEventListener("keydown", k); return () => window.removeEventListener("keydown", k);
  }, [onClose]);
  // Wheel over a ruler band re-scales periodicity (up = finer). Native + non-passive so we can swallow the page scroll; functional setState keeps it correct across renders.
  useEffect(() => {
    const onWheel = (e) => { e.preventDefault(); setUPerPx((u) => Math.min(UPP_MAX, Math.max(UPP_MIN, u * (e.deltaY < 0 ? 1 / 1.12 : 1.12)))); }; // scroll up = scale in
    const els = [hBandRef.current, vBandRef.current].filter(Boolean);
    els.forEach((el) => el.addEventListener("wheel", onWheel, { passive: false }));
    return () => els.forEach((el) => el.removeEventListener("wheel", onWheel, { passive: false }));
  }, []);
  // Snapshot rect on pointerdown, then apply pointer delta — no stale state, same pattern as startPointerSort.
  const startDrag = (mode) => (e) => {
    e.preventDefault(); e.stopPropagation();
    const s = { sx: e.clientX, sy: e.clientY, r: { ...rect }, u: uPerPx };
    const move = (ev) => {
      const dx = ev.clientX - s.sx, dy = ev.clientY - s.sy;
      if (mode === "move") { setRect({ ...s.r, x: Math.round(s.r.x + dx), y: Math.round(s.r.y + dy) }); return; }
      // Free resize: width and height follow the corner directly. The ruler scale is uniform and re-pinned to whichever edge changed MORE (by relative amount) — that edge's fit-to-length stays constant while its marks stretch; the other edge's fit changes as a consequence. uPerPx divides by the dominant edge's size factor.
      const w1 = Math.max(24, Math.round(s.r.w + dx)), h1 = Math.max(24, Math.round(s.r.h + dy));
      const relW = Math.abs(w1 - s.r.w) / s.r.w, relH = Math.abs(h1 - s.r.h) / s.r.h;
      const F = relW >= relH ? w1 / s.r.w : h1 / s.r.h; // dominant edge's size factor
      setRect({ ...s.r, w: w1, h: h1 });
      setUPerPx(Math.min(UPP_MAX, Math.max(UPP_MIN, s.u / F)));
    };
    const up = () => { window.removeEventListener("pointermove", move); window.removeEventListener("pointerup", up); document.body.style.userSelect = ""; };
    document.body.style.userSelect = "none";
    window.addEventListener("pointermove", move); window.addEventListener("pointerup", up);
  };
  const { x, y, w, h } = rect;
  const per = UNITS[unit].per, ppu = per / uPerPx;         // screen px per 1 display unit (uniform on both axes)
  const spanW = (w * uPerPx) / per, spanH = (h * uPerPx) / per; // display units fit to width / height
  const stepW = niceStep(spanW), stepH = niceStep(spanH), dW = decimalsFor(stepW), dH = decimalsFor(stepH);
  const hTicks = ticksSpan(spanW, stepW), vTicks = ticksSpan(spanH, stepH);
  const strideW = Math.max(1, Math.ceil((dW ? 34 : 26) / (stepW * ppu))); // thin labels by on-screen gap; decimals need more room
  const strideH = Math.max(1, Math.ceil((dH ? 24 : 14) / (stepH * ppu)));
  const band = { position: "absolute", background: C.card, pointerEvents: "auto", cursor: "grab" };
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 60, pointerEvents: "none" }}>
      {/* measured region — interior passes clicks through to the app */}
      <div style={{ position: "absolute", left: x, top: y, width: w, height: h, border: `1.5px dashed ${AX}`, pointerEvents: "none" }} />
      {/* corner origin, doubles as move handle */}
      <div onPointerDown={startDrag("move")} title="Drag to move" style={{ ...band, left: x - T, top: y - T, width: T, height: T, border: `1px solid ${AX}`, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <span style={{ width: 5, height: 5, borderRadius: "50%", background: AX }} />
      </div>
      {/* horizontal ruler */}
      <div ref={hBandRef} onPointerDown={startDrag("move")} title="Drag to move · scroll to zoom" style={{ ...band, left: x, top: y - T, width: w, height: T, borderTop: `1px solid ${AX}`, borderBottom: `1px solid ${AX}` }}>
        <svg width={w} height={T} style={{ display: "block" }}>
          {hTicks.map((t, i) => { const X = t.v * ppu; return <line key={i} x1={X} y1={T} x2={X} y2={T - (t.major ? 9 : 5)} stroke={AX} />; })}
          {hTicks.filter((t) => t.major && Math.round(t.v / stepW) % strideW === 0).map((t, i) => <text key={i} x={t.v * ppu + 2} y={9} fontSize={8} fill={C.ink2} fontFamily={MONO}>{fmt(t.v, dW)}</text>)}
        </svg>
      </div>
      {/* vertical ruler */}
      <div ref={vBandRef} onPointerDown={startDrag("move")} title="Drag to move · scroll to zoom" style={{ ...band, left: x - T, top: y, width: T, height: h, borderLeft: `1px solid ${AX}`, borderRight: `1px solid ${AX}` }}>
        <svg width={T} height={h} style={{ display: "block" }}>
          {vTicks.map((t, i) => { const Y = t.v * ppu; return <line key={i} x1={T} y1={Y} x2={T - (t.major ? 9 : 5)} y2={Y} stroke={AX} />; })}
          {vTicks.filter((t) => t.major && Math.round(t.v / stepH) % strideH === 0).map((t, i) => <text key={i} x={2} y={Math.min(h - 3, t.v * ppu + 8)} fontSize={8} fill={C.ink2} fontFamily={MONO}>{fmt(t.v, dH)}</text>)}
        </svg>
      </div>
      {/* resize handle */}
      <div onPointerDown={startDrag("resize")} title="Drag to scale (uniform)" style={{ position: "absolute", left: x + w - 9, top: y + h - 9, width: 18, height: 18, pointerEvents: "auto", cursor: "nwse-resize" }}>
        <svg width={18} height={18}><path d="M17 5 L17 17 L5 17" fill="none" stroke={AX} strokeWidth={2} /></svg>
      </div>
      {/* size badge */}
      <div style={{ position: "absolute", left: x + w + 6, top: y + h - 10, pointerEvents: "none", background: AX, color: "#fff", fontFamily: MONO, fontSize: 10, fontWeight: 700, padding: "2px 6px", borderRadius: 5, whiteSpace: "nowrap" }}>{w} × {h}</div>
      {/* control chip */}
      <div style={{ position: "fixed", left: 12, bottom: 12, pointerEvents: "auto", background: C.ink, color: C.paper, borderRadius: 10, padding: "8px 10px", boxShadow: "0 8px 24px rgba(0,0,0,0.25)", display: "flex", alignItems: "center", gap: 10, fontFamily: MONO, fontSize: 11 }}>
        <span style={{ fontFamily: SANS, fontWeight: 700, letterSpacing: "0.04em" }}>RULER</span>
        <span style={{ color: "#cfc8bb" }} title="Units fit to width × height — zoom changes this, resize doesn't">fit {fmt(spanW, dW)}×{fmt(spanH, dH)} {UNITS[unit].tag}</span>
        <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
          <button onClick={() => zoomBy(ZOOM)} disabled={uPerPx >= UPP_MAX} title="Scale out — more units fit (−)" style={{ color: uPerPx >= UPP_MAX ? "#5e594f" : C.paper, display: "flex" }}><ZoomOut size={14} /></button>
          <button onClick={() => zoomBy(1 / ZOOM)} disabled={uPerPx <= UPP_MIN} title="Scale in — fewer units fit (+)" style={{ color: uPerPx <= UPP_MIN ? "#5e594f" : C.paper, display: "flex" }}><ZoomIn size={14} /></button>
        </span>
        <button onClick={cycleUnit} title="Units — plain · metric · imperial" style={{ color: C.paper, fontFamily: MONO, fontSize: 11, border: "1px solid #57524a", borderRadius: 6, padding: "1px 7px" }}>{UNITS[unit].tag}</button>
        <button onClick={resetScale} title="Ruler scale back to 1:1 with the region — doesn't resize" style={{ color: C.paper, fontFamily: SANS, fontSize: 11 }}>1:1</button>
        <button onClick={onClose} title="Close (Esc)" style={{ color: C.paper, display: "flex" }}><X size={15} /></button>
      </div>
    </div>
  );
}

</script>
